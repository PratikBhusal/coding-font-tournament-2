<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <style>
    :root {
      --favicon-bg: oklch(0.2 0 0);
      --favicon-fg: oklch(0.97 0 0);
    }

    @media (prefers-color-scheme: light) {
      :root {
        --favicon-bg: oklch(0.97 0 0);
        --favicon-fg: oklch(0.2 0 0);
      }
    }
  </style>
  <rect width="100" height="100" rx="15" fill="var(--favicon-bg)" />
  <text x="50" y="76" text-anchor="middle" font-size="72" font-weight="bold" font-family="ui-monospace, SFMono-Regular, Menlo, Monaco, 'Cascadia Code', Consolas, 'Liberation Mono', 'Courier New', monospace" fill="var(--favicon-fg)">CF</text>
</svg>
